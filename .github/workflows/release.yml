name: Release

# Builds and publishes the Windows installer to a GitHub Release.
# macOS builds (arm64 + x64) are produced locally with `npm run publish` /
# `npm run make` because they require the local Developer ID signing identity
# and Apple notarization credentials.
#
# To add macOS to CI later, add a `macos-latest` job and store the Developer ID
# certificate (.p12, base64) + notarization credentials as repository secrets.

on:
  # Driven ONLY by `gh workflow run` from scripts/release.sh (step 5). A `push: tags` trigger was
  # removed: creating the GitHub release also pushes the v* tag, which fired a SECOND concurrent run
  # that raced the dispatched one to upload Setup.exe/RELEASES/nupkg — mixing one run's nupkg with
  # the other's RELEASES feed and corrupting Windows auto-update (hit v0.9.3, v0.9.4, v0.9.5).
  workflow_dispatch: {}        # run on demand from the Actions tab or `gh workflow run`

permissions:
  contents: write              # lets the GitHub publisher create/upload the release

jobs:
  windows:
    name: Build & publish Windows (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build, package, and publish Windows installer
        run: npm run publish
        env:
          # Provided automatically by Actions; used by @electron-forge/publisher-github
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Stable, version-less Windows installer alias for somersaudio.com. The site links to
      # this fixed name via /releases/latest/download/L-Acoustic.Amp.Calc-Setup.exe, so its
      # Windows button always serves the newest build with no per-release website edit. It is
      # a byte-identical copy of the versioned Setup.exe published above. Squirrel auto-update
      # uses RELEASES + .nupkg (never the Setup.exe), so this alias cannot affect updates.
      - name: Upload stable Windows download alias
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          exe="$(find out/make -iname '*Setup.exe' | head -1)"
          if [ -z "$exe" ]; then echo "ERROR: no Setup.exe found under out/make" >&2; exit 1; fi
          cp "$exe" "L-Acoustic.Amp.Calc-Setup.exe"
          tag="v$(node -p "require('./package.json').version")"
          gh release upload "$tag" "L-Acoustic.Amp.Calc-Setup.exe" --clobber \
            -R somersaudio/Unofficial-L-Acoustics-Calculator-Beta-0.9.1
